name: Johny Morning Brief

on:
  schedule:
    # ตี 5 เวลาไทย (Asia/Bangkok) = 22:00 UTC วันอาทิตย์-พฤหัสบดี
    # (วันอาทิตย์ UTC = วันจันทร์ไทย, วันพฤหัส UTC = วันศุกร์ไทย)
    - cron: '0 22 * * 0-4'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date override (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git identity
        run: |
          git config user.name "Johny"
          git config user.email "johny-bot@users.noreply.github.com"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Johny Morning Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -z "$DATE_ARG" ]; then
            DATE_ARG=$(TZ="Asia/Bangkok" date +%Y-%m-%d)
          fi
          claude --allowedTools "Bash,mcp__fcd84069-fb7a-414a-96d9-693d6c7eecf4__list_events,mcp__0d253133-1396-44b2-aad2-f0e39d5fd171__notion-fetch,WebFetch" \
            -p "$(cat morning_brief.md) Date: ${DATE_ARG}" \
            --max-turns 20 \
            2>&1 | tee /tmp/johny-run.log || echo "[ERROR] Claude run failed"

      - name: Push articles if any
        run: |
          git add articles/ || true
          git diff --staged --quiet || git commit -m "brief: [JOHNY] $(TZ='Asia/Bangkok' date +%Y-%m-%d)"
          git push || true
